<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="left">
            <header>
                <h1>Iniciar Sesión</h1>
                <p>Bienvenido de nuevo, ingresa tus datos</p>
            </header>
            <form id="loginForm" method="POST" novalidate>
                <div class="form-field">
                    <label for="correo">Correo electrónico</label>
                    <input type="email" name="correo" id="correo">
                    <div id="invalid-user" class="error" aria-live="polite"></div>
                </div>

                <div class="form-field">
                    <label for="password">Contraseña</label>
                    <input type="password" name="password" id="password" autocomplete="off">
                    <a href="#" class="forgot-pass">¿Olvidaste tu contraseña?</a>
                    <div id="invalid-pass" class="error" aria-live="polite"></div>
                </div>

                <footer>
                    <button class="footer-log-in-btn" id="submitBtn">Iniciar Sesión</button>
                    <div class="no-account">
                        <p>¿No tienes cuenta?</p>
                        <a href="#">Regístrate</a>
                    </div>
                    <div class="continue-with">O continuar con</div>
                    <div class="socials">
                        <a class="socials-img" href="#" id="googleLogin" title="Continuar con Google">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google">
                        </a>
                        <a class="socials-img" href="#" id="appleLogin" title="Continuar con Apple">
                            <svg viewBox="0 0 384 512" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                                <path fill="#000" d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5c0 26.2 4.8 53.3 14.4 81.2 12.8 37.2 59 128.2 107.2 126.6 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-83.5 102.6-120.8-65.2-30.7-61.7-90-61.7-91.8zm-90.5-167.2c19.3-22.9 35-55.4 31-87.5-30.4 1.5-65.7 21-86.7 46.3-19 22.6-35.4 55.6-30.7 88 30.6-.1 64-18.9 86.4-46.8z"/>
                            </svg>
                        </a>
                    </div>
                </footer>
            </form>
        </div>
        <div class="right">
        </div>
    </div>
    <script src="login.js"></script>
</body>
</html>
